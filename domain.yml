version: "3.1"

intents:
  - greet
  - goodbye
  - bot_challenge
  - ask_motivation
  - ask_success
  - ask_love
  - ask_humor
  - ask_inspiration
  - ask_life_advice
  - ask_wisdom
  - affirm
  - deny
  - thank
  - mood_great
  - mood_unhappy
  - mood_stressed
  - mood_anxious
  - mood_tired
  - another_quote
  - feedback_positive
  - feedback_negative

entities:
  - emotion
  - category

slots:
  emotion:
    type: text
    mappings:
      - type: from_text
  category:
    type: text
    mappings:
      - type: from_text
  last_quote:
    type: text
    mappings:
      - type: custom
  last_category:
    type: text
    mappings:
      - type: custom
  quote_history:
    type: list
    mappings:
      - type: custom

responses:
  utter_greet:
    - text: "Hi! I'm your ultimate quote companion! 🌟 Tell me how you feel or what kind of quote you need: motivation, love, humor, wisdom, or inspiration!"

  utter_goodbye:
    - text: "Bye! Stay inspired and come back anytime! ✨"
    - text: "Take care! Remember, every day is a fresh start 🌟"
    - text: "Goodbye! Keep smiling and stay positive! 😊"

  utter_iamabot:
    - text: "I'm Ultimate QuoteBot, an AI assistant with over 100+ quotes built to share inspiration based on your mood!"

  utter_happy:
    - text: "That's wonderful! Keep that positive energy! 🌟 Here's something for you:"
    - text: "So glad to hear that! Here's to more great days ahead! 🎉"
    - text: "Awesome! Happiness looks good on you! 😊"

  utter_cheer_up:
    - text: "I'm sorry you're feeling this way. Here's a comforting thought: tough times don't last, but tough people do. 💪"
    - text: "Every storm runs out of rain. Better days are coming! 🌈"
    - text: "It's okay to not be okay. Take a deep breath, and let's find some inspiration together."

  utter_did_that_help:
    - text: "Did that help lift your spirits a bit?"
    - text: "Feeling any better now?"
    - text: "Would you like another quote to boost your mood?"

  utter_welcome:
    - text: "You're welcome! 😊 Come back anytime for more inspiration!"
    - text: "Happy to help! Let me know if you need another quote!"
    - text: "My pleasure! That's what I'm here for ✨"

  utter_ask_another:
    - text: "Would you like another quote? Just say 'another one'!"
    - text: "Want to hear more? Ask for another one!"
    - text: "I have plenty more! Say 'another quote' if you'd like."

  utter_help_categories:
    - text: "I can share quotes about motivation, success, love, humor, inspiration, and wisdom! What would you like?"

  utter_fallback:
    - text: "I'm not sure I understood. Try saying something like 'motivate me', 'love quote', or 'I feel sad'."

actions:
  - action_send_quote
  - action_another_quote
  - action_send_quote_by_emotion

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true