version: "3.1"

stories:
- story: motivation test
  steps:
  - user: |
      motivate me
    intent: ask_motivation
  - action: action_send_quote

- story: love test
  steps:
  - user: |
      love quote
    intent: ask_love
  - action: action_send_quote

- story: humor test
  steps:
  - user: |
      tell me a joke
    intent: ask_humor
  - action: action_send_quote

- story: sad path test
  steps:
  - user: |
      hello
    intent: greet
  - action: utter_greet
  - user: |
      i feel sad
    intent: mood_unhappy
  - action: utter_cheer_up
  - action: action_send_quote_by_emotion
  - action: utter_did_that_help